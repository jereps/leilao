    <mat-table [dataSource]="leiloes">

      <!-- Nome Column -->
      <ng-container matColumnDef="nome">
        <mat-header-cell  *matHeaderCellDef>Leilão</mat-header-cell>
        <mat-cell  *matCellDef="let leilao">{{ leilao.nome }}</mat-cell>
      </ng-container>

      <!-- dataHorarioLeilao Column -->
      <ng-container matColumnDef="DataHorario">
        <mat-header-cell  *matHeaderCellDef>Data Horario Leilao</mat-header-cell>
        <mat-cell  *matCellDef="let leilao">
          {{ leilao.dataHorarioLeilao | date:'dd/MM/yyyy HH:mm' }}
        </mat-cell>
      </ng-container>

      <!-- Categoria Column -->
      <ng-container matColumnDef="categoria">
        <mat-header-cell  *matHeaderCellDef>Categoria</mat-header-cell>
        <mat-cell  *matCellDef="let leilao">{{ leilao.categoria }}</mat-cell>
      </ng-container>

      <!-- descricao Column -->
      <ng-container matColumnDef="descricao">
        <mat-header-cell  *matHeaderCellDef>Descricao</mat-header-cell>
        <mat-cell  *matCellDef="let leilao">{{ leilao.descricao }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions" >
        <mat-header-cell *matHeaderCellDef class="action-column-header">
          <button matMiniFab color="accent" aria-label="Adicionar um Leilão">
            <mat-icon (click)="onAdd()" >add</mat-icon>
          </button>
        </mat-header-cell>

        <mat-cell *matCellDef="let leilao" class="action-column">
          <button matIconButton (click)="onEdit(leilao)" color="primary" aria-label="Editar Leilão" class="btn btn1">
            <mat-icon>edit</mat-icon>
          </button>

          <button matIconButton (click)="onDelete(leilao)" color="warn" aria-label="Deletar Leilão" class="btn btn2">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row  *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row (click)="clickedRows(row)"  *matRowDef="let row; columns: displayedColumns"></mat-row>
    </mat-table>
